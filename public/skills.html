<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Découvrez et proposez des compétences sur Symbiose">
    <title>Compétences - Symbiose</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <header class="header" id="main-header">
        <div class="container">
            <a href="index.html" class="logo">
                <span class="logo-icon">∞</span>
                <span class="logo-text">Symbiose</span>
            </a>
            <nav class="nav">
                <ul class="nav-list">
                    <li class="nav-item"><a href="index.html" class="nav-link">Accueil</a></li>
                    <li class="nav-item"><a href="skills.html" class="nav-link active">Compétences</a></li>
                    <li class="nav-item"><a href="senior-dashboard.html" class="nav-link">Espace Senior</a></li>
                    <li class="nav-item"><a href="chat.html" class="nav-link"><i class="fas fa-comment-dots" style="font-size:0.75em;margin-right:4px;"></i>Messagerie</a></li>
                </ul>
                <div class="nav-actions">
                    <!-- Injecté par main.js selon l'état de connexion -->
                </div>
            </nav>
            <button class="mobile-menu-toggle" aria-label="Menu">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </header>

    <section class="section" style="padding-top: calc(80px + 80px);">
        <div class="container">
            <div class="section-header">
                <h2 class="section-title">Découvrez les talents</h2>
                <p class="section-subtitle">Trouvez la compétence idéale ou proposez la vôtre</p>
            </div>
            <div id="skills-container" class="skills-grid">
                <div class="text-center" style="width:100%;grid-column:1/-1;">
                    <p>Chargement des compétences...</p>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>© 2026 Symbiose. Tous droits réservés.</p>
            </div>
        </div>
    </footer>

    <div id="contact-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h3 id="modal-title">Contacter</h3>
            <div id="modal-body"></div>
            <div style="margin-top:1.5rem;text-align:center;">
                <button class="btn btn-primary" onclick="closeModal()">Fermer</button>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/skills.js"></script>
</body>

</html>
